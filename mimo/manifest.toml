contract_version = "1.0"
name = "mimo"
description = "MiMo Code via ACP — Xiaomi's OpenCode fork (TypeScript)"
install_cmd = "export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x \"$BF_NODE_DIR/bin/node\" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch=\"$(uname -m)\";   case \"$arch\" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo \"Unsupported architecture for Node.js: $arch\" >&2; exit 1 ;;   esac;   tmp=\"$(mktemp -d)\";   mkdir -p /opt/benchflow;   curl -fsSLo \"$tmp/node.tar.xz\" \"https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz\";   rm -rf \"$BF_NODE_DIR\";   mkdir -p \"$BF_NODE_DIR\";   tar -xJf \"$tmp/node.tar.xz\" -C \"$BF_NODE_DIR\" --strip-components=1 --no-same-owner;   rm -rf \"$tmp\"; fi; export PATH=\"/opt/benchflow/node/bin:$PATH\"; \"$BF_NODE_DIR/bin/node\" --version; \"$BF_NODE_DIR/bin/npm\" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH=\"/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH\" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @mimo-ai/cli@0.1.0 ) && printf '%s\\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/mimo \"$@\"' > /opt/benchflow/bin/mimo && chmod +x /opt/benchflow/bin/mimo && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/mimo ] && [ -x /opt/benchflow/bin/mimo ] && printf '%s' '' | base64 -d > /opt/benchflow/bin/mimo-proxy && chmod +x /opt/benchflow/bin/mimo-proxy"
launch_cmd = "/opt/benchflow/bin/mimo-proxy acp"
protocol = "acp"
acp_model_format = "provider/model"
skill_paths = [
    "$HOME/.mimocode/skills",
]
home_dirs = [
    ".mimocode",
    ".config/mimocode",
]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
