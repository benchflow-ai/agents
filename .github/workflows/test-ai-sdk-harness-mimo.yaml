name: ai-sdk-harness-mimo

on:
  push:
    branches: [main]
    paths:
      - 'ai-sdk/harness-mimo/**'
      - '.github/workflows/test-ai-sdk-harness-mimo.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-sdk/harness-mimo/**'
      - '.github/workflows/test-ai-sdk-harness-mimo.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
        working-directory: ai-sdk/harness-mimo
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      # --prerelease=allow: benchflow pins an rc litellm
      - name: Install dependencies
        run: uv pip install --python ${Python_ROOT_DIR} --prerelease=allow -e '.[dev]'
      - name: Run pytest
        run: pytest -q
