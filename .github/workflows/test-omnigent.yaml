name: omnigent

on:
  push:
    branches: [main]
    paths:
      - 'omnigent/**'
      - '.github/workflows/test-omnigent.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'omnigent/**'
      - '.github/workflows/test-omnigent.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
        working-directory: omnigent
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      # --prerelease=allow: benchflow pins an rc litellm. Published benchflow
      # lacks the session-factory seam, so register() returns None by design and
      # the seam-gated test skips; the import-safe + helper tests still run.
      - name: Install dependencies
        run: uv pip install --python ${Python_ROOT_DIR} --prerelease=allow -e '.[dev]'
      - name: Run pytest
        run: pytest -q
      - name: Ruff
        run: uvx ruff check src tests
