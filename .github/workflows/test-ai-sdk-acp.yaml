name: ai-sdk-acp

on:
  push:
    branches: [main]
    paths:
      - 'ai-sdk-acp/**'
      - '.github/workflows/test-ai-sdk-acp.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-sdk-acp/**'
      - '.github/workflows/test-ai-sdk-acp.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
        working-directory: ai-sdk-acp
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      # --prerelease=allow: benchflow pins an rc litellm
      - name: Install dependencies
        run: uv pip install --python ${Python_ROOT_DIR} --prerelease=allow -e '.[dev]'
      - name: node --check server.mjs
        run: node --check src/ai_sdk_acp/server.mjs
      - name: Run pytest
        run: pytest -q
      - name: Ruff
        run: uvx ruff check src tests
