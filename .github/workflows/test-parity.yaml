name: parity

on:
  push:
    branches: [main]
    paths:
      - 'skills/adaptation-parity/scripts/**'
      - '.github/workflows/test-parity.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/adaptation-parity/scripts/**'
      - '.github/workflows/test-parity.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
        working-directory: skills/adaptation-parity/scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # parity.py is a stdlib-only script dir (no package); only pytest is needed.
      - name: Install pytest
        run: pip install pytest
      - name: Run pytest
        run: PYTHONPATH=. pytest test_parity.py -q
