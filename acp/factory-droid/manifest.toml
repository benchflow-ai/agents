contract_version = "1.0"
name = "factory-droid"
description = "Factory Droid CLI (`droid`, Factory-AI/factory) - Factory's proprietary AI coding agent over ACP. Distributed as the npm `droid` package whose postinstall pulls the per-arch native binary via optionalDependency @factory/cli-linux-x64 and hard-links bin/droid to the ELF (no node needed at runtime). The ACP server is `droid exec --output-format acp-daemon`; it launches and handshakes HEADLESSLY with only the FACTORY_API_KEY env var set - no mandatory browser login. The daemon's `initialize` advertises a `factory-api-key` authMethod that reads FACTORY_API_KEY from env (alongside an OPTIONAL `device-pairing` browser flow), so a placeholder key is enough to reach initialize + session/new. RUNNABLE-NOT-WIRED: the model and the LLM call are Factory-managed and route to Factory's own backend, NOT through the BenchFlow gateway (upstreamRequests=0). Default model claude-opus-4-8; catalog spans Claude / GPT-5.x / Gemini / Droid-Core (GLM, Kimi, DeepSeek, MiniMax, Nemotron). A real Factory account/API key is required at eval time to actually produce output, but the ACP server launch + initialize + session/new all succeed with a placeholder key. The only BYO-base-URL path is Factory BYOK custom models (~/.factory config.json with a generic OpenAI chat-completions provider + `--model custom:<id>`), which is NOT wired here. Verified on the headless ACP smoke (port 12016, deepseek-v4-flash): initOk=true, session/new returned sessionId f099ce13-..., no hang."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then if ! command -v curl >/dev/null 2>&1 || ! command -v tar >/dev/null 2>&1 || ! command -v xz >/dev/null 2>&1; then if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y -qq curl ca-certificates tar xz-utils; elif command -v dnf >/dev/null 2>&1; then dnf -y install curl ca-certificates tar xz; elif command -v apk >/dev/null 2>&1; then apk add --no-cache curl ca-certificates tar xz; else echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2; exit 127; fi; fi; arch="$(uname -m)"; case "$arch" in x86_64|amd64) node_arch=x64 ;; aarch64|arm64) node_arch=arm64 ;; *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;; esac; tmp="$(mktemp -d)"; mkdir -p /opt/benchflow; curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz"; rm -rf "$BF_NODE_DIR"; mkdir -p "$BF_NODE_DIR"; tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner; rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents droid@0.159.1 ) && printf '%s\n' '#!/bin/sh' 'export PATH="/opt/benchflow/node/bin:$PATH"' 'exec /opt/benchflow/js-agents/bin/droid "$@"' > /opt/benchflow/bin/droid && chmod +x /opt/benchflow/bin/droid && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/droid ] && [ -x /opt/benchflow/bin/droid ]'''
launch_cmd = '''export FACTORY_API_KEY="${FACTORY_API_KEY:-fk-benchflow-placeholder}"; exec /opt/benchflow/bin/droid exec --output-format acp-daemon'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["droid", "factory-droid"]

[env_mapping]
BENCHFLOW_PROVIDER_API_KEY = "FACTORY_API_KEY"
