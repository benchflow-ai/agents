contract_version = "1.0"
name = "auggie"
description = "Augment Code's Auggie CLI (@augmentcode/auggie, v0.29.0) over ACP (`auggie --acp`). OWN-BACKEND / VENDOR-LOCKED: the LLM call is server-side on an Augment tenant (POST <tenantURL>/chat-stream, Augment's proprietary streaming protocol) -- there is no BYO OpenAI/Anthropic base_url on the primary path, so it does NOT route through the BenchFlow gateway and CANNOT be wired to the mock (upstreamRequests=0 by construction). It IS runnable headlessly: the interactive `auggie login` is bypassed non-interactively by AUGMENT_SESSION_AUTH, a JSON session blob the launcher composes from the mapped env. CRITICAL: that JSON must contain accessToken + tenantURL + a scopes ARRAY (all three) or auggie._parseSessionFromString rejects it, isLoggedIn stays false, and session/new throws -32000 'Authentication required: Auggie does not currently support authenticating over ACP. Please run `auggie login`'. With a valid session blob the ACP server handshakes fully headless. Verified on the routing smoke with a shaped dummy token: initialize ok, session/new returned a real UUID sessionId, session/prompt then 404s at /chat-stream (expected -- dummy token + own backend, no gateway routing). supports_acp_set_model is false (Augment selects the model server-side). At eval time a REAL Augment account token (minted once via `auggie login` or the Augment dashboard) must be injected via the mapped env -- vendor key, no live interactive OAuth needed."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @augmentcode/auggie@0.29.0 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/auggie "$@"' > /opt/benchflow/bin/auggie && chmod +x /opt/benchflow/bin/auggie && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/auggie ] && [ -x /opt/benchflow/bin/auggie ]'''
launch_cmd = '''set -e; export AUGMENT_DISABLE_AUTO_UPDATE=1; TENANT="${AUGMENT_API_URL:-$BENCHFLOW_PROVIDER_BASE_URL}"; TOKEN="${AUGMENT_API_TOKEN:-$BENCHFLOW_PROVIDER_API_KEY}"; export AUGMENT_SESSION_AUTH="$(printf '{"accessToken":"%s","tenantURL":"%s","scopes":["*"]}' "$TOKEN" "$TENANT")"; exec /opt/benchflow/bin/auggie --acp'''
protocol = "acp"
api_protocol = "anthropic-messages"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["auggie", "augment"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "AUGMENT_API_URL"
BENCHFLOW_PROVIDER_API_KEY = "AUGMENT_API_TOKEN"
