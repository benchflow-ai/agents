contract_version = "1.0"
name = "dimcode"
description = "DimCode (ArcShips; proprietary; npx dimcode@0.2.2, beta channel) - a closed-source TUI coding agent whose npm wrapper fetches a ~140MB per-arch native binary; `dim acp` runs the ACP-over-stdio server. BYO model. The ACP server answers `initialize` with NO provider configured, but `session/new` then errors (-32000 'Authentication required: Provider credentials are required' / -32603 'No configured ACP provider'). CONTRARY to the registry catalog note, providers are NOT only configurable interactively via `/connect`: there is a headless `dim provider add <id> --api-key --base-url --model [--adapter]` CLI (plus `dim auth login --provider --api-key`) that persists the connection to ~/.dimcode/v2/dimcode.sqlite. The launcher runs `dim provider add deepseek ...` (reading OPENAI_BASE_URL/OPENAI_API_KEY/OPENAI_MODEL) before `dim acp`. Provider id `deepseek` uses the native `openai-compatible` driver: POSTs base_url + /chat/completions, sends the model id BARE, and accepts ANY --model string, so calls route through the gateway. (Built-in `openai` uses the OpenAI Responses API /v1/responses -> 404 on a chat-completions mock; `custom-provider` needs namespaced model ids -> 'No configured ACP provider'; `deepseek` is the clean chat-completions BYO path.) supports_acp_set_model=false - the model is config-owned via provider add --model (mapped from OPENAI_MODEL). Verified WIRED on the routing smoke: 2 upstream /v1/chat/completions, bare model 'deepseek-v4-flash', real sessionId, stopReason end_turn."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents/dimcode /opt/benchflow/bin && "$BF_NODE_DIR/bin/npm" install --prefix /opt/benchflow/js-agents/dimcode dimcode@0.2.2 && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/dimcode/node_modules/dimcode/bin/dim.mjs "$@"' > /opt/benchflow/bin/dim && chmod +x /opt/benchflow/bin/dim && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/dimcode/node_modules/dimcode-linux-x64/bin/dimcode ] && [ -x /opt/benchflow/bin/dim ]'''
launch_cmd = '''set -e; export PATH=/opt/benchflow/node/bin:$PATH; export DIMCODE_NO_DOWNLOAD=1; /opt/benchflow/bin/dim provider add deepseek --api-key "$OPENAI_API_KEY" --base-url "$OPENAI_BASE_URL" --model "$OPENAI_MODEL" >/dev/null 2>&1; exec /opt/benchflow/bin/dim acp'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["dim", "dimcode"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "OPENAI_MODEL"
