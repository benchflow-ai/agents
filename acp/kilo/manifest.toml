contract_version = "1.0"
name = "kilo"
description = "Kilo Code CLI (Kilo-Org/kilocode), an OpenCode-based coding agent, over ACP (`kilo acp`). npx @kilocode/cli@7.3.54 ships a per-arch native binary via npm optionalDependencies (x86_64 glibc -> @kilocode/cli-linux-x64). Routes any OpenAI-compatible provider through the gateway via a kilo.json written at LAUNCH time: it declares a `deepseek` @ai-sdk/openai-compatible provider with options.baseURL=$OPENAI_BASE_URL and options.apiKey={env:OPENAI_API_KEY} (kilo substitutes the key at runtime), plus a models-map entry and a top-level `model: \"deepseek/<id>\"`. supports_acp_set_model is false: kilo owns the model via the config file, NOT over ACP. The model id is templated into the config from $OPENAI_MODEL by the launch_cmd (printf), which is required because kilo's {env:} substitution fills config VALUES only -- the model appears as a config KEY (models map) and in the `model` value, so it cannot ride {env:} and must be written in. Verified: ACP routing smoke (deepseek-v4-flash, mock gateway) -> upstreamRequests=2, stopReason=end_turn. CAVEAT: baseURL is written verbatim, so the gateway base URL must include any required path suffix (e.g. .../v1); a host-only base needs the suffix appended."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @kilocode/cli@7.3.54 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/kilo "$@"' > /opt/benchflow/bin/kilo && chmod +x /opt/benchflow/bin/kilo && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/kilo ] && [ -x /opt/benchflow/bin/kilo ] && /opt/benchflow/bin/kilo --version'''
launch_cmd = '''set -e; M="${OPENAI_MODEL:-deepseek-v4-flash}"; printf '{"$schema":"https://app.kilo.ai/config.json","provider":{"deepseek":{"npm":"@ai-sdk/openai-compatible","name":"DeepSeek","options":{"baseURL":"%s","apiKey":"{env:OPENAI_API_KEY}"},"models":{"%s":{"name":"%s"}}}},"model":"deepseek/%s"}' "$OPENAI_BASE_URL" "$M" "$M" "$M" > kilo.json; exec /opt/benchflow/bin/kilo acp --log-level ERROR --print-logs'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["kilo", "kilocode"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "OPENAI_MODEL"
