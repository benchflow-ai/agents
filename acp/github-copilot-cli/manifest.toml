contract_version = "1.0"
name = "github-copilot-cli"
description = "GitHub Copilot CLI (@github/copilot) over ACP via its built-in `--acp` server. The npm package is a thin node loader that selects a bundled per-arch standalone binary (@github/copilot-linux-x64/-arm64); a LOCAL `npm install` bundles that binary so launch is offline (no runtime fetch; COPILOT_AUTO_UPDATE=false). Routes any OpenAI-compatible provider through its first-class BYOK path purely via env: COPILOT_PROVIDER_TYPE=openai + COPILOT_PROVIDER_BASE_URL + COPILOT_PROVIDER_API_KEY + COPILOT_MODEL (model sent BARE over /v1/chat/completions; COPILOT_PROVIDER_WIRE_API defaults to 'completions'). CRITICAL: setting COPILOT_PROVIDER_BASE_URL makes the CLI use that provider instead of GitHub Copilot's routing and, per `copilot help environment`, 'GitHub authentication is not required' -- so the ACP path launches fully headless with NO GitHub token/OAuth. This RESOLVES the prior 1.0.61 known_issue (session/new -32000 'Authentication required'): on 1.0.65 BYOK-in-ACP is honored. supports_acp_set_model is false because the model is delivered at launch via COPILOT_MODEL. Verified WIRED on the routing smoke (port 12009): initialize ok, session/new -> real UUID sessionId, session/prompt -> stopReason end_turn, upstreamRequests=2 to the mock /v1/chat/completions with bare model 'deepseek-v4-flash' (no real-task reward claimed). For a fully hermetic env, COPILOT_OFFLINE=true (which requires COPILOT_PROVIDER_BASE_URL) additionally disables telemetry/web/auto-update. LIVE CAVEAT (2026-07 census): in a clean headless sandbox `--acp` session/new returns -32000 'Authentication required' even with full BYOK env + COPILOT_OFFLINE=true — auth-gated until upstream honors BYOK headless."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then if ! command -v curl >/dev/null 2>&1 || ! command -v tar >/dev/null 2>&1 || ! command -v xz >/dev/null 2>&1; then if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y -qq curl ca-certificates tar xz-utils; elif command -v dnf >/dev/null 2>&1; then dnf -y install curl ca-certificates tar xz; elif command -v apk >/dev/null 2>&1; then apk add --no-cache curl ca-certificates tar xz; else echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2; exit 127; fi; fi; arch="$(uname -m)"; case "$arch" in x86_64|amd64) node_arch=x64 ;; aarch64|arm64) node_arch=arm64 ;; *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;; esac; tmp="$(mktemp -d)"; mkdir -p /opt/benchflow; curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz"; rm -rf "$BF_NODE_DIR"; mkdir -p "$BF_NODE_DIR"; tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner; rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; APPDIR=/opt/benchflow/acp/github-copilot-cli; rm -rf "$APPDIR"; mkdir -p "$APPDIR"; cd "$APPDIR"; /opt/benchflow/node/bin/npm init -y >/dev/null 2>&1; /opt/benchflow/node/bin/npm install @github/copilot@1.0.65; chmod -R a+rX /opt/benchflow; LOADER="$APPDIR/node_modules/@github/copilot/npm-loader.js"; PBIN="$(ls "$APPDIR"/node_modules/@github/copilot-linux-*/copilot 2>/dev/null | head -1)"; [ -f "$LOADER" ] && [ -n "$PBIN" ] && [ -x "$PBIN" ]'''
launch_cmd = '''set -e; export COPILOT_AUTO_UPDATE=false; export COPILOT_OFFLINE="${COPILOT_OFFLINE:-true}"; export COPILOT_PROVIDER_TYPE="${COPILOT_PROVIDER_TYPE:-openai}"; export COPILOT_HOME="${COPILOT_HOME:-$HOME/.copilot-bf}"; mkdir -p "$COPILOT_HOME"; exec /opt/benchflow/node/bin/node /opt/benchflow/acp/github-copilot-cli/node_modules/@github/copilot/npm-loader.js --acp'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["github-copilot-cli", "copilot", "github-copilot"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "COPILOT_PROVIDER_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "COPILOT_PROVIDER_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "COPILOT_MODEL"
