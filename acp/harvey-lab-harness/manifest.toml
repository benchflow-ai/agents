contract_version = "1.0"
name = "harvey-lab-harness"
description = "Harvey LAB harness — runs the original Harvey LAB agent loop (6 tools: bash, read, write, edit, glob, grep) via ACP shim"
install_cmd = "export DEBIAN_FRONTEND=noninteractive && ( command -v git >/dev/null 2>&1 ||   (apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1) ) && ( [ -d /opt/harvey-labs/.git ] ||   git clone --depth 1 https://github.com/harveyai/harvey-labs.git /opt/harvey-labs ) && ( command -v pip3 >/dev/null 2>&1 ||   (apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null 2>&1) ) && ( python3 -m venv /opt/benchflow/harvey-lab-venv 2>/dev/null ||   (apt-get update -qq && apt-get install -y -qq python3-venv >/dev/null 2>&1 &&    python3 -m venv /opt/benchflow/harvey-lab-venv) ) && /opt/benchflow/harvey-lab-venv/bin/python -m pip install -q anthropic openai google-genai python-docx pdfplumber openpyxl python-pptx markitdown pandas && ( command -v python3 >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq python3 >/dev/null 2>&1) ) && mkdir -p /opt/benchflow/bin && echo  | base64 -d > /opt/benchflow/bin/harvey-lab-acp-shim && chmod +x /opt/benchflow/bin/harvey-lab-acp-shim"
launch_cmd = "HARVEY_LABS_ROOT=/opt/harvey-labs /opt/benchflow/harvey-lab-venv/bin/python /opt/benchflow/bin/harvey-lab-acp-shim"
protocol = "acp"
