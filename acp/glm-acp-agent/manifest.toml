contract_version = "1.0"
name = "glm-acp-agent"
description = "GLM ACP Agent (stefandevo/glm-acp-agent, npm glm-acp-agent@1.1.4) - a native-ACP coding agent (@agentclientprotocol/sdk + the OpenAI SDK) built for Z.AI / Zhipu's GLM family. Despite the catalog VENDOR_LOCKED note (Z.AI's real endpoint only whitelists GLM model ids), the agent is purely OpenAI-Chat-Completions under the hood and its base URL is fully overridable via ACP_GLM_BASE_URL, so pointing it at the gateway routes ANY model through unchanged. Key (Z_AI_API_KEY) is read lazily only when the model is first called, so initialize+session/new handshake with no key; GlmClient is built on first prompt. Model is delivered either via ACP_GLM_MODEL env (session default) OR via ACP session/set_model - the agent's unstable_setSessionModel accepts arbitrary ids (warns 'not in advertised list; using as-is'), so supports_acp_set_model is true. Model id is sent BARE on /v1/chat/completions. Verified wired on PORT 12005: initialize->session/new->session/prompt drove 2 upstream /v1/chat/completions with bare model 'deepseek-v4-flash', stopReason end_turn, in both default-via-env and explicit session/set_model modes."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents glm-acp-agent@1.1.4 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/glm-acp-agent "$@"' > /opt/benchflow/bin/glm-acp-agent && chmod +x /opt/benchflow/bin/glm-acp-agent && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/glm-acp-agent ] && [ -x /opt/benchflow/bin/glm-acp-agent ]'''
launch_cmd = '''/opt/benchflow/bin/glm-acp-agent'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = true
aliases = ["glm", "glm-acp-agent"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "ACP_GLM_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "Z_AI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "ACP_GLM_MODEL"
