contract_version = "1.0"
name = "qoder"
description = "Qoder CLI (@qoder-ai/qodercli, a Claude-Code/Gemini-style coding CLI) over ACP via `--acp`. VENDOR-LOCKED / own-backend: Qoder runs its own Qoder-managed models against region-locked Qoder domains (QODER_API_DOMAIN_US/SG/JP) and exposes NO arbitrary base URL, so it CANNOT route through BenchFlow's gateway and never hits the mock (upstreamRequests=0). RUNNABLE under the relaxed bar: with the documented non-interactive PAT env bypass (QODER_PERSONAL_ACCESS_TOKEN, for CI/no-browser per README method-two) plus NO_BROWSER=1, `--acp` launches fully headless and handshakes ACP `initialize` (initOk=true) WITHOUT any interactive OAuth/browser. session/new is auth-gated: with a dummy PAT it returns a clean -32000 'Authentication required' (no interactive prompt) — a VALID Qoder PAT (vendor key at eval time, validated against qoder.com, not impersonable by the mock) is required for sessions, which the relaxed bar permits. supports_acp_set_model=false: models are Qoder-managed aliases (e.g. 'ultimate') delivered via -m, not routable benchmark model ids. env_mapping maps only the credential to the vendor PAT; base_url/model are vendor-owned and unmapped."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @qoder-ai/qodercli@0.2.14 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/qodercli "$@"' > /opt/benchflow/bin/qoder && chmod +x /opt/benchflow/bin/qoder && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/qodercli ] && [ -x /opt/benchflow/bin/qoder ]'''
launch_cmd = '''NO_BROWSER=1 exec /opt/benchflow/bin/qoder --acp'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["qoder", "qodercli"]

[env_mapping]
BENCHFLOW_PROVIDER_API_KEY = "QODER_PERSONAL_ACCESS_TOKEN"
