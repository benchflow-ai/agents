contract_version = "1.0"
name = "corust-agent"
description = "Corust Agent (Corust-ai/corust-agent-release) - a fine-tuned Rust coding partner exposed as a NATIVE-ACP server (`corust-acp` 0.1.0). Per-arch prebuilt binary (v0.6.0, x86_64 Linux only - the release ships NO arm64-linux build; darwin x64/arm64 + windows x64 also exist). The binary speaks ACP directly over stdio with NO subcommand (registry cmd = `./corust-agent-acp`, args=[]). VENDOR-LOCKED backend: it routes its own LLM calls through Corust's hosted gateway `https://gateway.corust.ai` (OneRouter upstream; default model `anthropic/claude-sonnet-4.6`) authenticated by a Corust account key in CORUST_API_KEY - there is NO arbitrary base_url override and arbitrary models are validated against the gateway catalog ('Persisted workspace model not in gateway catalog; clearing override and falling back to default'), so a BenchFlow base_url/model CANNOT be injected and it does NOT route through the BenchFlow gateway. CRITICAL for headlessness: auth is purely an ENV/file key (CORUST_API_KEY env, or a CORUST_HOME secrets.toml) - NO interactive OAuth/browser login is required to LAUNCH, and the ACP `initialize`+`session/new` handshake completes even with a placeholder key (the binary starts, blocks on stdin, and answers the JSON-RPC handshake without contacting the gateway). RUNNABLE (not wired): verified on the routing smoke as initOk=true + non-null sessionId (UUIDv7) with upstreamRequests=0 (it uses its own vendor gateway, not the mock); stopReason=null because the actual model turn needs a real Corust key/quota. supports_acp_set_model=false because the model is gateway-catalog-owned (not env/ACP-routable to a BenchFlow model)."
install_cmd = '''set -e; export DEBIAN_FRONTEND=noninteractive; ( command -v curl >/dev/null 2>&1 && command -v tar >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq curl ca-certificates tar) ); A=$(uname -m); case "$A" in x86_64|amd64) U="https://github.com/Corust-ai/corust-agent-release/releases/download/v0.6.0/agent-linux-x64.tar.gz";; *) echo "no corust-agent binary for $A (x86_64-linux only)" >&2; exit 1;; esac; mkdir -p /opt/benchflow/acp/corust-agent; curl -fsSL "$U" -o /tmp/bf-corust.tgz; tar -xzf /tmp/bf-corust.tgz -C /opt/benchflow/acp/corust-agent; chmod +x /opt/benchflow/acp/corust-agent/corust-agent-acp; chmod -R a+rX /opt/benchflow; [ -x /opt/benchflow/acp/corust-agent/corust-agent-acp ]'''
launch_cmd = '''set -e; export CORUST_HOME="${CORUST_HOME:-$HOME/.corust-agent-bf}"; mkdir -p "$CORUST_HOME"; export CORUST_API_KEY="${CORUST_API_KEY:-bf-placeholder}"; exec /opt/benchflow/acp/corust-agent/corust-agent-acp'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "prefixed"
supports_acp_set_model = false
aliases = ["corust", "corust-agent"]

[env_mapping]
BENCHFLOW_PROVIDER_API_KEY = "CORUST_API_KEY"
