contract_version = "1.0"
name = "autohand"
description = "Autohand Code (@autohandai/autohand-acp v0.2.1) — a thin ACP ADAPTER (Node, @agentclientprotocol/sdk 0.12.0) that wraps the real `autohand` coding CLI (autohand-cli v0.9.1). The adapter IS the ACP server: it answers `initialize` unconditionally (advertising an install/login auth-method only as metadata when the backend is missing) and answers `session/new` with a real UUID once the backend binary is present. Backend selection + the account-login gate are both controlled by AUTOHAND_CMD: the adapter's `isStub` check is `AUTOHAND_CMD && existsSync(AUTOHAND_CMD)`, so pointing AUTOHAND_CMD at the bundled real autohand bin BOTH satisfies the CLI-installed check AND bypasses the interactive `autohand login`/checkAuthStatus account gate (no OAuth needed). VERIFIED headless on the routing smoke (port 12020, deepseek-v4-flash): initOk=true, session/new returned UUID 51f637e8-35b8-4de3-a5cf-e54794cf7386. RUNNABLE, not wired: the model backend is config-file-owned (~/.autohand/config.json) and — per upstream research — NOT headlessly retargetable to a custom OpenAI-compatible endpoint over ACP, so the prompt turn does not route to the gateway (upstreamRequests=0; prompt turn times out under the mock). It runs on autohand's own/vendor backend, which is fine under the relaxed bar. The adapter reads AUTOHAND_MODEL to override the model (mapped below); base_url/api_key have NO env hook in the adapter (config-file only) so they are not env-mapped. AUTOHAND_PERMISSION_MODE=auto keeps it fully non-interactive (no external permission HTTP server)."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @autohandai/autohand-acp@0.2.1 autohand-cli@0.9.1 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/autohand-acp "$@"' > /opt/benchflow/bin/autohand-acp && chmod +x /opt/benchflow/bin/autohand-acp && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/autohand-acp ] && [ -x /opt/benchflow/js-agents/bin/autohand ]'''
launch_cmd = '''set -e; export PATH=/opt/benchflow/node/bin:$PATH; export AUTOHAND_CMD=/opt/benchflow/js-agents/bin/autohand; export AUTOHAND_HOME="${AUTOHAND_HOME:-$HOME/.autohand-bf}"; mkdir -p "$AUTOHAND_HOME"; export AUTOHAND_PERMISSION_MODE="${AUTOHAND_PERMISSION_MODE:-auto}"; exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/autohand-acp'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["autohand", "autohand-code", "autohand-acp"]

[env_mapping]
BENCHFLOW_PROVIDER_MODEL = "AUTOHAND_MODEL"
