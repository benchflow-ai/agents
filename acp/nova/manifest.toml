contract_version = "1.0"
name = "nova"
description = "Nova by Compass AI (@compass-ai/nova, MIT per package.json) - a Claude-only software-engineer agent built on @anthropic-ai/sdk, served over ACP via the `nova acp` subcommand. Its ACP runtime is anthropic-messages ONLY and exposes nova's built-in Claude models; the model is NOT env-overridable to an arbitrary id. The standard ANTHROPIC_BASE_URL is IGNORED by nova's resolveBaseUrl (it takes the Claude model-registry baseUrl https://api.anthropic.com); the ONLY env that retargets its anthropic provider is COMPASS_ANTHROPIC_BASE_URL, with the key in ANTHROPIC_API_KEY. So this is wireable only to a gateway that exposes an anthropic-messages (/v1/messages) endpoint AND a run that uses a Claude-family model id. Verified under the relaxed runnable bar: installs headlessly and `nova acp` launches + handshakes (initialize -> session/new -> sessionId, stopReason end_turn). On the OpenAI-completions routing smoke upstreamRequests=0 because nova POSTs anthropic /v1/messages (the chat/completions mock 404s it) and the smoke model was a non-Claude id; a benign 'credentials need refresh' WARN is non-fatal and does NOT block the ACP handshake."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents @compass-ai/nova@1.1.17 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/nova "$@"' > /opt/benchflow/bin/nova && chmod +x /opt/benchflow/bin/nova && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/nova ] && [ -x /opt/benchflow/bin/nova ]'''
launch_cmd = '''export COMPASS_ANTHROPIC_BASE_URL="${COMPASS_ANTHROPIC_BASE_URL:-$BENCHFLOW_PROVIDER_BASE_URL}"; exec /opt/benchflow/bin/nova acp'''
protocol = "acp"
api_protocol = "anthropic-messages"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["nova", "compass"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "COMPASS_ANTHROPIC_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "ANTHROPIC_API_KEY"
