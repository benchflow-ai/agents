contract_version = "1.0"
name = "cline"
description = "Cline (cline/cline) - popular autonomous coding agent CLI, distributed via npm (`cline@3.0.24`) as a thin Node binary-resolver that execs a platform-specific Bun-compiled binary (@cline/cli-linux-x64). Serves ACP over stdio with `cline --acp`. Routed to an OpenAI-compatible host via the BYO `openai-native` provider, written to <data-dir>/settings/providers.json by `cline auth -p openai-native -b <base_url> -m <model> -k <key>` (the launcher's config-writer). Two gotchas handled by the launcher: (1) `newSession` is gated `if(!authResult && !CLINE_API_KEY){ tryRestoreAuth() }` and tryRestoreAuth only restores the `cline`/`openai-codex` account methods (NOT openai-native), so without a bypass session/new errors -32000 'Call authenticate before creating a session' (the only ACP authMethods advertised are interactive 'Sign in with Cline' OAuth and 'Sign in with ChatGPT Subscription'); the launcher sets CLINE_API_KEY to satisfy the gate headlessly. (2) newSession picks the provider/model from CLINE_PROVIDER (else authResult.providerId else 'cline') and CLINE_MODEL (else 'anthropic/claude-sonnet-4.6'), so the launcher exports CLINE_PROVIDER=openai-native and CLINE_MODEL=<model>. supports_acp_set_model is false (model is env/config-owned, bare id). CAVEAT (runnable, NOT wired): cline's openai-native provider has the documented base-url-ignored bug - chat calls still hit api.openai.com, so the routing smoke logged upstreamRequests=0; it nonetheless launches headlessly and handshakes (initOk:true, real sessionId, stopReason end_turn). Wire to the gateway only after the upstream fix lands."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents cline@3.0.24 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/cline "$@"' > /opt/benchflow/bin/cline && chmod +x /opt/benchflow/bin/cline && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/cline ] && [ -x /opt/benchflow/bin/cline ]'''
launch_cmd = '''set -e; export PATH=/opt/benchflow/node/bin:/opt/benchflow/bin:$PATH; DATA="$HOME/.cline-bf"; mkdir -p "$DATA"; /opt/benchflow/bin/cline auth -p openai-native -b "$OPENAI_BASE_URL" -m "$OPENAI_MODEL" -k "${OPENAI_API_KEY:-bench}" --data-dir "$DATA" >/dev/null 2>&1 || true; export CLINE_API_KEY="${OPENAI_API_KEY:-bench}"; export CLINE_PROVIDER=openai-native; export CLINE_MODEL="$OPENAI_MODEL"; exec /opt/benchflow/bin/cline --acp --data-dir "$DATA"'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["cline"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "OPENAI_MODEL"
