contract_version = "1.0"
name = "mimo-acp"
description = "MiMo Code (Xiaomi, OpenCode fork) native `mimo acp` ACP server via the `mimo` CLI — no server.mjs (mimo is the ACP server)"
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "provider/model"
supports_acp_set_model = true
requires_env = []
install_timeout = 1200
aliases = [
    "mimo-code",
]
install_cmd = "export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x \"$BF_NODE_DIR/bin/node\" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch=\"$(uname -m)\";   case \"$arch\" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo \"Unsupported architecture for Node.js: $arch\" >&2; exit 1 ;;   esac;   tmp=\"$(mktemp -d)\";   mkdir -p /opt/benchflow;   curl -fsSLo \"$tmp/node.tar.xz\" \"https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz\";   rm -rf \"$BF_NODE_DIR\";   mkdir -p \"$BF_NODE_DIR\";   tar -xJf \"$tmp/node.tar.xz\" -C \"$BF_NODE_DIR\" --strip-components=1 --no-same-owner;   rm -rf \"$tmp\"; fi; export PATH=\"/opt/benchflow/node/bin:$PATH\"; \"$BF_NODE_DIR/bin/node\" --version; \"$BF_NODE_DIR/bin/npm\" --version && mkdir -p /opt/benchflow/js-agents/mimo-acp && printf '%s' '{\"name\":\"bf-mimo-acp\",\"private\":true,\"type\":\"module\"}' > /opt/benchflow/js-agents/mimo-acp/package.json && cd /opt/benchflow/js-agents/mimo-acp && /opt/benchflow/node/bin/npm install @mimo-ai/cli@0.1.4 --no-audit --no-fund >/dev/null 2>&1 && chmod -R a+rX /opt/benchflow && [ -f /opt/benchflow/js-agents/mimo-acp/node_modules/@mimo-ai/cli/bin/mimo ]"
launch_cmd = "printf '%s' '' | base64 -d > /tmp/mimo-acp-launch.sh && sh /tmp/mimo-acp-launch.sh"

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
