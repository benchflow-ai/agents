contract_version = "1.0"
name = "dirac"
description = "Dirac CLI (dirac-run/dirac), a BYO OpenAI-compatible coding agent, over ACP (npx, pure-JS, dirac-cli@0.4.9). CAVEAT — ACP mode does NOT honor the CLI --model/--provider flags (those only apply to the `task` subcommand); the ACP SessionConfigManager reads provider+model from persisted StateManager settings, defaulting to provider=openrouter / model=anthropic/claude-sonnet-4.5. Merely setting OPENAI_API_BASE/OPENAI_API_KEY (which dirac DOES read into openAiBaseUrl/openAiApiKey) is not enough — the active provider stays openrouter and never hits the gateway. Wiring therefore SEEDS persisted config at launch via the non-interactive `dirac auth --provider openai --apikey --modelid --baseurl --config <dir>`, then launches `dirac --acp --config <dir>`; that forces actModeApiProvider=openai + actModeOpenAiModelId=<model> + openAiBaseUrl + openAiApiKey, routing the openai-compatible chat/completions through the gateway. Model is config/env-owned (supports_acp_set_model=false); do NOT set the benchmark model over ACP. Verified wired-by-construction: skills/adaptation-parity smoke on deepseek-v4-flash routed 6 upstream chat/completions (bare model id) and completed end_turn. KNOWN CAVEAT (catalog): dirac can close its stdout mid-run (benchflow pipe_closed); if it routes >=1 request before that it still counts as routed — not observed in the smoke (clean end_turn, 6 reqs)."
install_cmd = '''export DEBIAN_FRONTEND=noninteractive; BF_NODE_DIR=/opt/benchflow/node; BF_NODE_VERSION=22.20.0; if [ ! -x "$BF_NODE_DIR/bin/node" ]; then   if ! command -v curl >/dev/null 2>&1 ||      ! command -v tar >/dev/null 2>&1 ||      ! command -v xz >/dev/null 2>&1; then     if command -v apt-get >/dev/null 2>&1; then       apt-get update -qq &&       apt-get install -y -qq curl ca-certificates tar xz-utils;     elif command -v dnf >/dev/null 2>&1; then       dnf -y install curl ca-certificates tar xz;     elif command -v apk >/dev/null 2>&1; then       apk add --no-cache curl ca-certificates tar xz;     else       echo 'BenchFlow JS agent bootstrap requires curl, tar, and xz' >&2;       exit 127;     fi;   fi;   arch="$(uname -m)";   case "$arch" in     x86_64|amd64) node_arch=x64 ;;     aarch64|arm64) node_arch=arm64 ;;     *) echo "Unsupported architecture for Node.js: $arch" >&2; exit 1 ;;   esac;   tmp="$(mktemp -d)";   mkdir -p /opt/benchflow;   curl -fsSLo "$tmp/node.tar.xz" "https://nodejs.org/dist/v${BF_NODE_VERSION}/node-v${BF_NODE_VERSION}-linux-${node_arch}.tar.xz";   rm -rf "$BF_NODE_DIR";   mkdir -p "$BF_NODE_DIR";   tar -xJf "$tmp/node.tar.xz" -C "$BF_NODE_DIR" --strip-components=1 --no-same-owner;   rm -rf "$tmp"; fi; export PATH="/opt/benchflow/node/bin:$PATH"; "$BF_NODE_DIR/bin/node" --version; "$BF_NODE_DIR/bin/npm" --version && mkdir -p /opt/benchflow/js-agents /opt/benchflow/bin && export PATH="/opt/benchflow/bin:/opt/benchflow/js-agents/bin:/opt/benchflow/node/bin:$PATH" && ( /opt/benchflow/node/bin/npm install -g --prefix /opt/benchflow/js-agents dirac-cli@0.4.9 ) && printf '%s\n' '#!/bin/sh' 'exec /opt/benchflow/node/bin/node /opt/benchflow/js-agents/bin/dirac "$@"' > /opt/benchflow/bin/dirac && chmod +x /opt/benchflow/bin/dirac && chmod -R a+rX /opt/benchflow && [ -x /opt/benchflow/js-agents/bin/dirac ] && [ -x /opt/benchflow/bin/dirac ]'''
launch_cmd = '''DCFG="$(mktemp -d)"; /opt/benchflow/bin/dirac auth --provider openai --apikey "$OPENAI_API_KEY" --modelid "$OPENAI_MODEL" --baseurl "$OPENAI_API_BASE" --config "$DCFG" >/dev/null 2>&1 || true; exec /opt/benchflow/bin/dirac --acp --config "$DCFG"'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["dirac"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_API_BASE"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "OPENAI_MODEL"
