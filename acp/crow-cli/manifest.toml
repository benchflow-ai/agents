contract_version = "1.0"
name = "crow-cli"
description = "crow-cli (crow-cli/crow-cli) - a minimal vendor-agnostic NATIVE-ACP agent (OpenAI SDK + FastMCP + SQLAlchemy ReAct loop), per-arch Linux binary v0.1.25 (PyInstaller onefile, `crow-cli acp` subcommand). Routes any OpenAI-compatible host purely via a ~/.crow config.yaml the launcher writes, using crow's built-in ${ENV} interpolation: providers.<p>.{base_url,api_key} + models.<m>.{provider,model}; the OpenAI client is AsyncOpenAI(base_url,api_key) and the model id is sent BARE. Model is config/env-owned: crow's default model is the single configured `models:` entry, so supports_acp_set_model is false - crow exposes model choice as an ACP session config-option 'select' (NewSessionResponse.config_options), NOT the standard session/set_model, and has NO set_session_model handler (calling it would error). CAVEATS handled by the launcher: (1) crow HARD-REQUIRES >=1 MCP tool server or new_session raises ValueError('No MCP servers defined') -> we ship the upstream default crow-mcp stdio server via uvx (pre-warmed into UV_CACHE_DIR at install so runtime is offline-fast); (2) db_uri MUST be a full SQLAlchemy URL (sqlite:///...) or new_session dies 'Could not parse SQLAlchemy URL' -> launcher writes an explicit sqlite:/// db_uri; (3) crow only auto-creates its logs/ dir when writing defaults, so the launcher mkdir -p's logs/ since it pre-writes config.yaml. Verified wired-by-construction on the routing smoke: 2 upstream /v1/chat/completions, bare model 'deepseek-v4-flash', stopReason end_turn (no real-task reward claimed)."
install_cmd = '''set -e; export DEBIAN_FRONTEND=noninteractive; ( command -v curl >/dev/null 2>&1 && command -v tar >/dev/null 2>&1 && command -v xz >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq curl ca-certificates tar xz-utils) ); A=$(uname -m); case "$A" in x86_64|amd64) U="https://github.com/crow-cli/crow-cli/releases/download/v0.1.25/crow-cli-linux-x86_64.tar.gz";; aarch64|arm64) U="https://github.com/crow-cli/crow-cli/releases/download/v0.1.25/crow-cli-linux-aarch64.tar.gz";; *) echo "no crow-cli binary for $A" >&2; exit 1;; esac; mkdir -p /opt/benchflow/acp/crow-cli; curl -fsSL "$U" -o /tmp/bf-crow.tgz; tar -xzf /tmp/bf-crow.tgz -C /opt/benchflow/acp/crow-cli; chmod +x /opt/benchflow/acp/crow-cli/crow-cli; export UV_INSTALL_DIR=/opt/benchflow/uv; curl -LsSf https://astral.sh/uv/install.sh | sh; export PATH=/opt/benchflow/uv:$PATH; export UV_CACHE_DIR=/opt/benchflow/uv-cache; timeout 300 /opt/benchflow/uv/uvx crow-mcp </dev/null >/dev/null 2>&1 || true; chmod -R a+rX /opt/benchflow; [ -x /opt/benchflow/acp/crow-cli/crow-cli ]'''
launch_cmd = '''set -e; export PATH=/opt/benchflow/uv:$HOME/.local/bin:/usr/local/bin:$PATH; export UV_CACHE_DIR=/opt/benchflow/uv-cache; CFGDIR="$HOME/.crow-bf"; mkdir -p "$CFGDIR/logs"; cat > "$CFGDIR/config.yaml" <<'YAML'
db_uri: sqlite:///${HOME}/.crow-bf/crow.db
mcpServers:
  crow-mcp:
    transport: stdio
    command: uvx
    args:
      - crow-mcp
providers:
  bench:
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_BASE_URL}
models:
  bench:
    provider: bench
    model: ${OPENAI_MODEL}
YAML
exec /opt/benchflow/acp/crow-cli/crow-cli acp --config-dir "$CFGDIR"'''
protocol = "acp"
api_protocol = "openai-completions"
acp_model_format = "bare"
supports_acp_set_model = false
aliases = ["crow", "crow-cli"]

[env_mapping]
BENCHFLOW_PROVIDER_BASE_URL = "OPENAI_BASE_URL"
BENCHFLOW_PROVIDER_API_KEY = "OPENAI_API_KEY"
BENCHFLOW_PROVIDER_MODEL = "OPENAI_MODEL"
